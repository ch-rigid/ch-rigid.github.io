<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#f1f0ee"/>
  <g fill="none" stroke="#8a8278" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <!-- Head -->
    <ellipse cx="100" cy="70" rx="28" ry="34"
      style="stroke-dasharray: 2 1; stroke-width: 1.8;"/>
    <!-- Hair - short -->
    <path d="M73 60 Q78 32 100 28 Q122 32 127 60" style="stroke-width: 1.4;"/>
    <path d="M75 55 Q80 38 95 33" style="stroke-width: 0.9;"/>
    <path d="M125 55 Q120 38 105 33" style="stroke-width: 0.9;"/>
    <!-- Eyes -->
    <circle cx="88" cy="66" r="2.5" style="stroke-width: 1.2;"/>
    <circle cx="112" cy="66" r="2.5" style="stroke-width: 1.2;"/>
    <!-- Eyebrows -->
    <path d="M83 60 Q88 57 93 60" style="stroke-width: 1;"/>
    <path d="M107 60 Q112 57 117 60" style="stroke-width: 1;"/>
    <!-- Nose -->
    <path d="M100 70 L97 79 Q100 81 103 79" style="stroke-width: 1;"/>
    <!-- Mouth -->
    <path d="M93 88 Q100 91 107 88" style="stroke-width: 1.1;"/>
    <!-- Neck -->
    <path d="M93 102 L93 118" style="stroke-width: 1.3;"/>
    <path d="M107 102 L107 118" style="stroke-width: 1.3;"/>
    <!-- Shoulders -->
    <path d="M93 118 Q58 124 38 148 Q33 160 36 180" style="stroke-width: 1.8; stroke-dasharray: 3 2;"/>
    <path d="M107 118 Q142 124 162 148 Q167 160 164 180" style="stroke-width: 1.8; stroke-dasharray: 3 2;"/>
    <!-- Collar -->
    <path d="M93 118 L100 132 L107 118" style="stroke-width: 1.2;"/>
  </g>
</svg>